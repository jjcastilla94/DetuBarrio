<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login / Register</title>

    <!-- CSS compilado de SASS (Bootstrap personalizado) -->
    <link rel="stylesheet" href="styles.css">

    <style>
        .left-panel {
            background-color: #003366;
            color: white;
        }
        .left-panel h2 {
            font-weight: bold;
        }
        .brand-logo {
            width: 90px;
        }
        .google-icon {
            width: 20px;
            margin-right: 8px;
        }
    </style>
</head>

<body class="bg-light">

<div class="container-fluid vh-100">
    <div class="row h-100">

        <!-- Lado izquierdo -->
        <div class="col-lg-6 d-none d-lg-flex flex-column justify-content-center align-items-center left-panel text-center px-5">
            <img src="images/logo_blanco.png" class="brand-logo mb-3" alt="Logo DetuBarrio">
            <h2>DetuBarrio</h2>
            <p class="mt-3 fs-5">
                Conectando barrios, potenciando lo local.  
                Únete para descubrir y apoyar los negocios de tu comunidad.
            </p>
        </div>

        <!-- Lado derecho -->
        <div class="col-lg-6 d-flex align-items-center justify-content-center">
            <div class="w-100" style="max-width: 420px;">

                <!-- Pestañas -->
                <ul class="nav nav-tabs mb-4" id="myTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">
                            Iniciar Sesión
                        </button>
                    </li>

                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">
                            Registrarse
                        </button>
                    </li>
                </ul>

                <div class="tab-content">

                    <!-- FORM LOGIN -->
                    <div class="tab-pane fade show active" id="login" role="tabpanel">
                        
                        <h3 class="mb-3 fw-bold">Bienvenido de nuevo</h3>
                        <p class="text-muted">Por favor, introduce tus datos para acceder.</p>

                        <div id="authFeedback" class="alert d-none" role="alert"></div>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input id="loginEmail" type="email" class="form-control" placeholder="tu.email@ejemplo.com" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <input id="loginPassword" type="password" class="form-control" placeholder="Introduce tu contraseña" required>
                            </div>

                            <div class="d-flex justify-content-between mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="rememberMe">
                                    <label class="form-check-label" for="rememberMe">
                                        Recuérdame
                                    </label>
                                </div>
                                <a href="#" class="text-primary">¿Has olvidado tu contraseña?</a>
                            </div>

                            <button type="submit" class="btn w-100 text-white mb-3" style="background-color: #003366;">
                                Iniciar Sesión
                            </button>

                            <div class="text-center text-muted mb-3">o</div>

                            <button type="button" class="btn btn-outline-secondary w-100">
                                <img src="images/icon_google.png" class="google-icon"> Continuar con Google
                            </button>
                        </form>
                    </div>

                    <!-- FORM REGISTER -->
                    <div class="tab-pane fade" id="register" role="tabpanel">
                        <h3 class="mb-3 fw-bold">Crear una cuenta</h3>

                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input id="registerNombre" type="text" class="form-control" placeholder="Tu nombre completo" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input id="registerEmail" type="email" class="form-control" placeholder="tu.email@ejemplo.com" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <input id="registerPassword" type="password" class="form-control" placeholder="Crea una contraseña" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Tipo de cuenta</label>
                                <select id="registerRol" class="form-select" required>
                                    <option value="USUARIO">Usuario</option>
                                    <option value="COMERCIO">Comercio</option>
                                </select>
                            </div>

                            <div class="mb-3 d-none" id="registerComercioWrapper">
                                <label class="form-label">ID de comercio (opcional)</label>
                                <input id="registerComercioId" type="number" min="1" class="form-control" placeholder="Ej: 2">
                            </div>

                            <button type="submit" class="btn w-100 text-white" style="background-color: #003366;">
                                Registrarse
                            </button>
                        </form>
                    </div>

                </div>

            </div>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/auth.js"></script>

</body>
</html>
