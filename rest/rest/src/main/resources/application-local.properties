spring.datasource.url=jdbc:h2:mem:detubarrio_local;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=${APP_JWT_SECRET:DetuBarrioSecretKeyDetuBarrioSecretKey2026}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION:86400}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
