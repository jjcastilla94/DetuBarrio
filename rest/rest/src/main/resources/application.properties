spring.application.name=rest

# Carga variables desde rest/rest/.env (formato KEY=VALUE)
spring.config.import=optional:file:.env[.properties]

server.port=8080

# MySQL lo gestionas manualmente con Docker/Workbench; evita que Spring intente levantar docker-compose.
spring.docker.compose.enabled=false

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=never

logging.level.org.springframework.security=INFO

app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION:86400}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

app.contact.admin-email=${CONTACT_ADMIN_EMAIL:info@detubarrio.local}
app.contact.from-email=${CONTACT_FROM_EMAIL:no-reply@detubarrio.local}
spring.flyway.baseline-on-migrate=true