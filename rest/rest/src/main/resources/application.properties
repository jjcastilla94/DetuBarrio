spring.application.name=rest

server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/detubarrio?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=never

logging.level.org.springframework.security=INFO

app.jwt.secret=${APP_JWT_SECRET:DetuBarrioSecretKeyDetuBarrioSecretKey2026}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION:86400}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
